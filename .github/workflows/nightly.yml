name: Nightly Build
on:
  push:
    branches: [master]
permissions:
  contents: write
jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - x86_64-unknown-linux-musl
          - aarch64-unknown-linux-musl
          - x86_64-pc-windows-gnu
          - aarch64-pc-windows-gnullvm
          - x86_64-apple-darwin
          - aarch64-apple-darwin
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: goto-bus-stop/setup-zig@v2
        with:
          zig-version: master
      - uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.target }}-cargo-
      - name: Install cargo-zigbuild
        run: cargo install cargo-zigbuild --force
      - name: Build
        run: cargo zigbuild --release --locked --target ${{ matrix.target }}
      - name: Copy binary (Unix)
        if: "!contains(matrix.target, 'windows')"
        run: cp target/${{ matrix.target }}/release/cs cs-${{ matrix.target }}
      - name: Copy binary (Windows)
        if: contains(matrix.target, 'windows')
        run: cp target/${{ matrix.target }}/release/cs.exe cs-${{ matrix.target }}.exe
      - name: Upload artifact (Unix)
        if: "!contains(matrix.target, 'windows')"
        uses: actions/upload-artifact@v7
        with:
          name: cs-${{ matrix.target }}
          path: cs-${{ matrix.target }}
      - name: Upload artifact (Windows)
        if: contains(matrix.target, 'windows')
        uses: actions/upload-artifact@v7
        with:
          name: cs-${{ matrix.target }}
          path: cs-${{ matrix.target }}.exe
  release:
    name: Publish nightly release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/download-artifact@v8
        with:
          path: artifacts/
          merge-multiple: true
      - name: Create/update nightly release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: nightly
          name: Nightly Build
          body: |
            Automated nightly build from `master` branch.

            **Commit:** ${{ github.sha }}
            **Date:** ${{ github.event.head_commit.timestamp }}

            These are development builds — use at your own risk.
          prerelease: true
          make_latest: false
          files: artifacts/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
