name: Nightly Build

on:
  push:
    branches: [master]

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - x86_64-unknown-linux-musl
          - aarch64-unknown-linux-musl
          - x86_64-pc-windows-gnu
          - aarch64-pc-windows-gnullvm
          - x86_64-apple-darwin
          - aarch64-apple-darwin
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: goto-bus-stop/setup-zig@v2
        with:
          zig-version: master

      - uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.target }}-cargo-

      - name: Install cargo-zigbuild
        run: cargo install cargo-zigbuild --force

      - name: Build
        run: cargo zigbuild --release --locked --target ${{ matrix.target }}

      - name: Package (Unix)
        if: "!contains(matrix.target, 'windows')"
        run: |
          mkdir -p release
          cp LICENSE README.md release/
          cp target/${{ matrix.target }}/release/cs release/
          cd release && tar -czvf ../cs-${{ matrix.target }}.tar.gz .

      - name: Package (Windows)
        if: contains(matrix.target, 'windows')
        run: |
          mkdir -p release
          cp LICENSE README.md release/
          cp target/${{ matrix.target }}/release/cs.exe release/
          cd release && zip -r ../cs-${{ matrix.target }}.zip .

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: cs-${{ matrix.target }}
          path: cs-${{ matrix.target }}.*

  release:
    name: Publish nightly release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v8
        with:
          path: artifacts/
          merge-multiple: true

      - name: Create/update nightly release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: nightly
          name: Nightly Build
          body: |
            Automated nightly build from `master` branch.

            **Commit:** ${{ github.sha }}
            **Date:** ${{ github.event.head_commit.timestamp }}

            These are development builds — use at your own risk.
          prerelease: true
          make_latest: false
          files: artifacts/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
